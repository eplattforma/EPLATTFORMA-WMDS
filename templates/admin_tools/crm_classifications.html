{% extends "base.html" %}

{% block title %}CRM Classifications Settings{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="d-flex align-items-center mb-3">
                <h4 class="mb-0"><i class="fas fa-list me-2 text-primary"></i>CRM Customer Classifications</h4>
            </div>

            <div class="card">
                <div class="card-body">
                    <p class="text-muted">Enter one classification per line. These values will appear in the CRM Dashboard dropdown.</p>
                    
                    <form id="classifyForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Classifications (one per line)</label>
                            <textarea class="form-control font-monospace" id="items" name="items" rows="10">{% for item in items %}{{ item }}
{% endfor %}</textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Save Classifications
                        </button>
                        <button type="reset" class="btn btn-outline-secondary ms-2">
                            <i class="fas fa-undo me-1"></i>Reset
                        </button>
                    </form>

                    <div id="resultBox" class="mt-3 d-none"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('classifyForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = e.submitter;
    btn.disabled = true;
    const text = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Saving…';

    const items = document.getElementById('items').value;
    const fd = new FormData();
    fd.append('items', items);

    try {
        const res = await fetch(window.location.href, { method: 'POST', body: fd });
        const data = await res.json();
        const box = document.getElementById('resultBox');
        if (data.ok) {
            box.className = 'mt-3 alert alert-success';
            box.innerHTML = `<i class="fas fa-check-circle me-1"></i> ${data.msg}`;
        } else {
            box.className = 'mt-3 alert alert-danger';
            box.innerHTML = `<i class="fas fa-exclamation-triangle me-1"></i> Error: ${data.error}`;
        }
    } catch(err) {
        const box = document.getElementById('resultBox');
        box.className = 'mt-3 alert alert-danger';
        box.innerHTML = `<i class="fas fa-exclamation-triangle me-1"></i> ${err.message}`;
    } finally {
        btn.disabled = false;
        btn.innerHTML = text;
    }
});
</script>
{% endblock %}
