<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ error_code }} - WMDS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="text-center py-5">
        <h1 class="display-1 text-danger fw-bold">{{ error_code }}</h1>
        <h2 class="mb-3">{{ error_message }}</h2>
        <p class="lead text-muted">Something went wrong. Please try again or contact support.</p>
        <div class="mt-4 d-flex gap-2 justify-content-center">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>Go to Home
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Go Back
            </a>
        </div>
    </div>
</body>
</html>
